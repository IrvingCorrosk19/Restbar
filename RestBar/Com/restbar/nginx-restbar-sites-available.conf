# /etc/nginx/sites-available/restbar.autonomousflow.lat
# RestBar - mismo patrón que fixhub/carnet/travel/n8n
# Copiar a la VPS y activar: see CONFIGURACION_RESTBAR_VPS.md

# HTTP (80): acme-challenge para Certbot + redirección a HTTPS
server {
    listen 80;
    server_name restbar.autonomousflow.lat;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (443): proxy a RestBar (puerto 8084)
server {
    listen 443 ssl http2;
    server_name restbar.autonomousflow.lat;
    ssl_certificate /etc/letsencrypt/live/autonomousflow.lat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autonomousflow.lat/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    location / {
        proxy_pass http://127.0.0.1:8084;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
