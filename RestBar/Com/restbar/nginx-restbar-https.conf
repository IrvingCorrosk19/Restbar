# RestBar - HTTPS (443) - proxy a 8084 (mismo certificado multi-dominio que carnet/fixhub/travel/n8n)
server {
    listen 443 ssl http2;
    server_name restbar.autonomousflow.lat;
    ssl_certificate /etc/letsencrypt/live/autonomousflow.lat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autonomousflow.lat/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    location / {
        proxy_pass http://127.0.0.1:8084;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
