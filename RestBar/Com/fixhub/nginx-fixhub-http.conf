# FixHub HTTP (80) acme-challenge - igual que carnet/travel/n8n
server {
    listen 80;
    server_name fixhub.autonomousflow.lat;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
