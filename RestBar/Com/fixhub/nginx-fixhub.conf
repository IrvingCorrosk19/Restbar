# FixHub - https://fixhub.autonomousflow.lat
# Misma estructura que carnet, travel, n8n: HTTP (80) con acme-challenge + HTTPS (443)
# Añadir al archivo /etc/nginx/sites-available/autonomousflow o usar como sites-available/fixhub.autonomousflow.lat
#
# --- Bloque HTTP (puerto 80): certbot validation + redirect a HTTPS ---
server {
    listen 80;
    server_name fixhub.autonomousflow.lat;
    # Let's Encrypt ACME challenge (igual que los otros subdominios)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
#
# --- Bloque HTTPS (puerto 443): proxy a FixHub en 8081 ---
server {
    listen 443 ssl http2;
    server_name fixhub.autonomousflow.lat;
    ssl_certificate /etc/letsencrypt/live/autonomousflow.lat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autonomousflow.lat/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
