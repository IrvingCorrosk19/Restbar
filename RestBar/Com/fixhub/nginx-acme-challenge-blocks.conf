# Bloques HTTP (80) solo para ACME challenge - certbot --webroot
# Añadir al inicio de autonomousflow para que certbot pueda validar todos los dominios
server {
    listen 80;
    server_name autonomousflow.lat;
    location /.well-known/acme-challenge/ { root /var/www/certbot; allow all; }
    location / { return 404; }
}
